<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Hours Tracker</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1, h2, h3 { margin-top: 0; }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .summary-box {
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            color: white;
            text-align: center;
        }
        .summary-box h2 { margin-bottom: 8px; font-size: 1.2rem; opacity: 0.9; }
        .summary-box .total { font-size: 3rem; font-weight: 800; margin: 0; }
        .summary-box .subtext { font-size: 0.9rem; opacity: 0.8; margin-top: 4px; }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        
        .btn-secondary {
            background-color: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            margin-top: 8px;
        }
        .btn-secondary:hover { background-color: var(--border); }
        
        .btn-danger {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 4px 8px;
            font-size: 0.8rem;
            width: auto;
        }
        .btn-danger:hover { background-color: var(--danger); color: white; }

        .week-block {
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
        }
        .week-block:last-child { border-bottom: none; }
        
        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--primary);
        }

        .day-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed var(--border);
        }
        .day-entry:last-child { border-bottom: none; }
        
        .day-info { flex: 1; }
        .day-date { font-weight: 600; }
        .day-note { font-size: 0.85rem; color: var(--text-light); }
        .day-hours { font-weight: 700; margin-right: 12px; }

        .data-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .data-controls button { flex: 1; font-size: 0.9rem; padding: 10px; }
        
        .hidden-file-input { display: none; }
        .empty-state { text-align: center; color: var(--text-light); padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card summary-box">
        <h2>Current Week Total</h2>
        <div class="total" id="currentWeekTotal">0</div>
        <div class="subtext">Hours (Monday - Friday)</div>
    </div>

    <div class="card">
        <h2>Log Hours</h2>
        <form id="hoursForm">
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label for="hours">Hours Worked</label>
                <input type="number" id="hours" step="0.25" min="0" max="24" placeholder="e.g., 8 or 7.5" required>
            </div>
            <div class="form-group">
                <label for="note">Notes (Optional)</label>
                <input type="text" id="note" placeholder="e.g., Regular shift, Overtime, Project X">
            </div>
            <button type="submit">Save Entry</button>
        </form>
    </div>

    <div class="card">
        <h2>History</h2>
        <div id="historyContainer">
            <div class="empty-state">No hours logged yet.</div>
        </div>
    </div>

    <div class="card">
        <h2>Data Management</h2>
        <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 12px;">
            ⚠️ Data is saved in your browser. <strong>Export your data regularly</strong> to avoid losing it if you clear your cache or switch devices.
        </p>
        <div class="data-controls">
            <button class="btn-secondary" onclick="exportData()">⬇ Export JSON</button>
            <button class="btn-secondary" onclick="document.getElementById('importFile').click()">⬆ Import JSON</button>
            <input type="file" id="importFile" class="hidden-file-input" accept=".json" onchange="importData(this)">
        </div>
        <button class="btn-danger" style="width: 100%; margin-top: 10px;" onclick="clearAllData()">🗑 Clear All Data</button>
    </div>
</div>

<script>
    // --- Data Management ---
    let entries = JSON.parse(localStorage.getItem('workHoursTracker')) || {};

    function saveData() {
        localStorage.setItem('workHoursTracker', JSON.stringify(entries));
        render();
    }

    // --- Date Helpers ---
    function getMonday(dateString) {
        const d = new Date(dateString);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Adjust when day is Sunday
        const monday = new Date(d.setDate(diff));
        return monday.toISOString().split('T')[0];
    }

    function formatDateDisplay(dateString) {
        const options = { weekday: 'short', month: 'short', day: 'numeric' };
        return new Date(dateString).toLocaleDateString('en-US', options);
    }

    // --- Core Logic ---
    document.getElementById('hoursForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const date = document.getElementById('date').value;
        const hours = parseFloat(document.getElementById('hours').value);
        const note = document.getElementById('note').value.trim();

        if (!date || isNaN(hours)) {
            alert('Please enter a valid date and hours.');
            return;
        }

        entries[date] = { hours, note };
        saveData();
        
        // Reset form but keep date as today for convenience
        document.getElementById('hours').value = '';
        document.getElementById('note').value = '';
    });

    function deleteEntry(date) {
        if (confirm(`Delete entry for ${formatDateDisplay(date)}?`)) {
            delete entries[date];
            saveData();
        }
    }

    function render() {
        const historyContainer = document.getElementById('historyContainer');
        historyContainer.innerHTML = '';

        const dates = Object.keys(entries).sort().reverse(); // Newest first
        
        if (dates.length === 0) {
            historyContainer.innerHTML = '<div class="empty-state">No hours logged yet.</div>';
            document.getElementById('currentWeekTotal').textContent = '0';
            return;
        }

        // Group by week (Monday)
        const weeks = {};
        dates.forEach(date => {
            const monday = getMonday(date);
            if (!weeks[monday]) {
                weeks[monday] = { days: {}, total: 0 };
            }
            weeks[monday].days[date] = entries[date];
            weeks[monday].total += entries[date].hours;
        });

        // Calculate Current Week Total
        const today = new Date().toISOString().split('T')[0];
        const currentWeekMonday = getMonday(today);
        const currentWeekData = weeks[currentWeekMonday];
        document.getElementById('currentWeekTotal').textContent = currentWeekData ? currentWeekData.total : 0;

        // Render History
        Object.keys(weeks).sort().reverse().forEach(monday => {
            const weekData = weeks[monday];
            const weekEnd = new Date(monday);
            weekEnd.setDate(weekEnd.getDate() + 4); // Friday
            const weekLabel = `${formatDateDisplay(monday)} - ${formatDateDisplay(weekEnd.toISOString().split('T')[0])}`;

            const weekBlock = document.createElement('div');
            weekBlock.className = 'week-block';

            const header = document.createElement('div');
            header.className = 'week-header';
            header.innerHTML = `<span>Week of ${weekLabel}</span> <span>${weekData.total} hrs</span>`;
            weekBlock.appendChild(header);

            Object.keys(weekData.days).sort().reverse().forEach(date => {
                const entry = weekData.days[date];
                const dayEl = document.createElement('div');
                dayEl.className = 'day-entry';
                dayEl.innerHTML = `
                    <div class="day-info">
                        <div class="day-date">${formatDateDisplay(date)}</div>
                        ${entry.note ? `<div class="day-note">${entry.note}</div>` : ''}
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span class="day-hours">${entry.hours}h</span>
                        <button class="btn-danger" onclick="deleteEntry('${date}')">Delete</button>
                    </div>
                `;
                weekBlock.appendChild(dayEl);
            });

            historyContainer.appendChild(weekBlock);
        });
    }

    // --- Export / Import ---
    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(entries));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "work_hours_backup_" + new Date().toISOString().split('T')[0] + ".json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function importData(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (confirm("This will merge imported data with your current data. Continue?")) {
                    entries = { ...entries, ...imported };
                    saveData();
                    alert("Data imported successfully!");
                }
            } catch (err) {
                alert("Invalid JSON file.");
            }
        };
        reader.readAsText(file);
        input.value = ''; // Reset input
    }

    function clearAllData() {
        if (confirm("⚠️ ARE YOU SURE? This will permanently delete all your logged hours. Make sure you have exported a backup first!")) {
            entries = {};
            saveData();
        }
    }

    // --- Initialization ---
    document.getElementById('date').valueAsDate = new Date(); // Set default to today
    render();
</script>

</body>
</html>
