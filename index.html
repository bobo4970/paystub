<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Hours Tracker</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-light: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .container { max-width: 600px; margin: 0 auto; }
        h1, h2, h3 { margin-top: 0; }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .summary-box {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            text-align: center;
            border: none;
        }
        .summary-box h2 { margin-bottom: 8px; font-size: 1.2rem; opacity: 0.9; }
        .summary-box .total { font-size: 3rem; font-weight: 800; margin: 0; }
        .summary-box .subtext { font-size: 0.9rem; opacity: 0.8; margin-top: 4px; }
        .summary-box .sync-badge { 
            font-size: 0.8rem; margin-top: 12px; opacity: 0.9; 
            background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; display: inline-block;
        }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; color: var(--text-light); }
        input {
            width: 100%; padding: 10px; border: 1px solid var(--border);
            border-radius: 6px; font-size: 1rem; box-sizing: border-box; font-family: inherit;
            background-color: var(--bg); color: var(--text);
        }
        input:focus { outline: 2px solid var(--primary); border-color: transparent; }

        button {
            background-color: var(--primary); color: white; border: none;
            padding: 12px 20px; border-radius: 6px; font-size: 1rem; font-weight: 600;
            cursor: pointer; width: 100%; transition: background 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: var(--border); cursor: not-allowed; color: var(--text-light); }
        
        .btn-secondary {
            background-color: var(--bg); color: var(--text); border: 1px solid var(--border); margin-top: 8px;
        }
        .btn-secondary:hover { background-color: var(--border); }
        
        .btn-danger {
            background-color: transparent; color: var(--danger); border: 1px solid var(--danger);
            padding: 4px 8px; font-size: 0.8rem; width: auto;
        }
        .btn-danger:hover { background-color: var(--danger); color: white; }

        .calendar-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
        }
        .calendar-header h3 { margin: 0; font-size: 1.2rem; }
        .nav-btn {
            width: auto; padding: 6px 12px; font-size: 0.9rem; background: var(--bg); border: 1px solid var(--border);
        }
        .nav-btn:hover { background: var(--border); }

        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
        }
        .calendar-day-name {
            text-align: center; font-size: 0.75rem; color: var(--text-light); font-weight: 600; padding: 4px 0;
        }
        .calendar-day {
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 0.9rem; font-weight: 500; position: relative;
            background-color: var(--bg); border: 1px solid var(--border); transition: transform 0.1s;
        }
        .calendar-day:hover { transform: scale(1.05); z-index: 1; }
        .calendar-day.empty { background: transparent; border: none; pointer-events: none; }
        
        .calendar-day .hours-badge {
            font-size: 0.65rem; font-weight: 700; background: rgba(0,0,0,0.3);
            padding: 1px 4px; border-radius: 4px; margin-top: 2px;
        }

        .heat-0 { background-color: var(--card-bg); color: var(--text-light); }
        .heat-1 { background-color: #1e3a8a; color: #ffffff; }
        .heat-2 { background-color: #1e40af; color: #ffffff; }
        .heat-3 { background-color: #1d4ed8; color: #ffffff; }
        .heat-4 { background-color: #2563eb; color: #ffffff; }
        .heat-5 { background-color: #3b82f6; color: #ffffff; }
        .heat-6 { background-color: #60a5fa; color: #0f172a; }
        .heat-7 { background-color: #93c5fd; color: #0f172a; }
        .heat-8 { background-color: #bfdbfe; color: #0f172a; }
        .heat-9 { background-color: #dbeafe; color: #0f172a; }
        .heat-10 { background-color: #eff6ff; color: #0f172a; }

        .legend {
            display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 16px; font-size: 0.8rem; color: var(--text-light);
        }
        .legend-box {
            width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--border);
        }

        .week-block { border-bottom: 1px solid var(--border); padding: 16px 0; }
        .week-block:last-child { border-bottom: none; }
        .week-header {
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 700; font-size: 1.1rem; margin-bottom: 12px; color: var(--primary);
        }
        .day-entry {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px dashed var(--border);
        }
        .day-entry:last-child { border-bottom: none; }
        .day-info { flex: 1; }
        .day-date { font-weight: 600; }
        .day-note { font-size: 0.85rem; color: var(--text-light); }
        .day-hours { font-weight: 700; margin-right: 12px; }

        .empty-state { text-align: center; color: var(--text-light); padding: 20px; }

        @keyframes moneyBurst {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--x-dest), var(--y-dest)) rotate(var(--rotation)) scale(0.5); opacity: 0; }
        }
        .money-particle {
            position: fixed; pointer-events: none; z-index: 9999;
            animation: moneyBurst 1.5s ease-out forwards; user-select: none;
        }

        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9); display: flex; align-items: center; justify-content: center;
            z-index: 10000; flex-direction: column; gap: 16px;
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div>Syncing with Google Sheets...</div>
</div>

<div class="container">
    <div class="card summary-box">
        <h2>Current Week Total</h2>
        <div class="total" id="currentWeekTotal">0</div>
        <div class="subtext">Hours (Monday - Sunday)</div>
        <div class="sync-badge" id="syncStatus">☁️ Auto-syncing to Google Sheets</div>
    </div>

    <div class="card">
        <div class="calendar-header">
            <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
            <h3 id="calendarTitle">Month Year</h3>
            <button class="nav-btn" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid">
            <div class="calendar-day-name">Mon</div>
            <div class="calendar-day-name">Tue</div>
            <div class="calendar-day-name">Wed</div>
            <div class="calendar-day-name">Thu</div>
            <div class="calendar-day-name">Fri</div>
            <div class="calendar-day-name">Sat</div>
            <div class="calendar-day-name">Sun</div>
        </div>
        <div class="legend">
            <span>Less</span>
            <div class="legend-box heat-0"></div>
            <div class="legend-box heat-2"></div>
            <div class="legend-box heat-4"></div>
            <div class="legend-box heat-6"></div>
            <div class="legend-box heat-8"></div>
            <div class="legend-box heat-10"></div>
            <span>More (10h+)</span>
        </div>
    </div>

    <div class="card">
        <h2>Log Hours</h2>
        <form id="hoursForm">
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label for="hours">Hours Worked</label>
                <input type="number" id="hours" step="0.25" min="0" max="24" placeholder="e.g., 8 or 7.5" required>
            </div>
            <div class="form-group">
                <label for="note">Notes (Optional)</label>
                <input type="text" id="note" placeholder="e.g., Regular shift, Overtime, Project X">
            </div>
            <button type="submit" id="submitBtn">Save Entry</button>
        </form>
    </div>

    <div class="card">
        <h2>History</h2>
        <div id="historyContainer">
            <div class="empty-state">No hours logged yet.</div>
        </div>
    </div>

    <div class="card">
        <h2>Data Management</h2>
        <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 12px;">
            ✅ Your data is permanently backed up to your Google Sheet.
        </p>
        <button class="btn-secondary" onclick="window.open('https://sheets.google.com', '_blank')">Open Google Sheet</button>
        <button class="btn-secondary" onclick="forceSync()">🔄 Force Re-Sync from Google Sheets</button>
        <button class="btn-danger" style="width: 100%; margin-top: 10px;" onclick="clearLocalData()">🗑 Clear Local Browser Cache Only</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbylSyVtrTvfya1O8z8Oh_Djmi2LRyv-vVhKStaPTRrFGlpbwD5VbMQxsLnbXZ9bloMovQ/exec';

    let entries = {};
    let currentCalDate = new Date();

    // --- Date Helpers (Timezone-Safe) ---
    function formatDateISO(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function parseDate(dateString) {
        const parts = dateString.split('-');
        return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    }

    function getMonday(dateString) {
        const d = parseDate(dateString);
        const day = d.getDay(); // 0=Sun, 1=Mon, ..., 6=Sat
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        d.setDate(diff);
        return formatDateISO(d);
    }

    function formatDateDisplay(dateString) {
        const d = parseDate(dateString);
        const options = { weekday: 'short', month: 'short', day: 'numeric' };
        return d.toLocaleDateString('en-US', options);
    }

    // --- Data Sync ---
    function saveLocalData() {
        localStorage.setItem('workHoursTracker', JSON.stringify(entries));
        render();
    }

    async function fetchFromGoogleSheets() {
        try {
            const response = await fetch(SCRIPT_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            entries = data;
            saveLocalData();
            return true;
        } catch (error) {
            console.error('Fetch error:', error);
            // Fallback to local storage
            entries = JSON.parse(localStorage.getItem('workHoursTracker')) || {};
            return false;
        }
    }

    async function forceSync() {
        document.getElementById('loadingOverlay').style.display = 'flex';
        await fetchFromGoogleSheets();
        document.getElementById('loadingOverlay').style.display = 'none';
        renderCalendar();
        alert('Sync complete!');
    }

    // --- Money Animation ---
    function triggerMoneyAnimation() {
        const btn = document.getElementById('submitBtn');
        const rect = btn.getBoundingClientRect();
        const startX = rect.left + rect.width / 2;
        const startY = rect.top + rect.height / 2;
        const emojis = ['💵', '💰', '💸', '🤑', '💲', '💎'];

        for (let i = 0; i < 25; i++) {
            const particle = document.createElement('span');
            particle.className = 'money-particle';
            particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            
            const xDest = (Math.random() - 0.5) * 300;
            const yDest = (Math.random() * -250) - 100;
            const rotation = (Math.random() - 0.5) * 720;
            const size = Math.random() * 1.5 + 1.5;

            particle.style.left = `${startX}px`;
            particle.style.top = `${startY}px`;
            particle.style.setProperty('--x-dest', `${xDest}px`);
            particle.style.setProperty('--y-dest', `${yDest}px`);
            particle.style.setProperty('--rotation', `${rotation}deg`);
            particle.style.fontSize = `${size}rem`;
            
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 1500);
        }
    }

    // --- Calendar ---
    function changeMonth(direction) {
        currentCalDate.setMonth(currentCalDate.getMonth() + direction);
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        while (grid.children.length > 7) grid.removeChild(grid.lastChild);

        const year = currentCalDate.getFullYear();
        const month = currentCalDate.getMonth();
        
        document.getElementById('calendarTitle').textContent = 
            currentCalDate.toLocaleString('default', { month: 'long' }) + ' ' + year;

        // Calculate first day offset (Monday = 0, Sunday = 6)
        let firstDay = new Date(year, month, 1).getDay();
        firstDay = (firstDay === 0) ? 6 : firstDay - 1;
        
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'calendar-day empty';
            grid.appendChild(emptyCell);
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const entry = entries[dateStr];
            const hours = entry ? entry.hours : 0;
            
            let heatLevel = 0;
            if (hours > 0) heatLevel = Math.min(Math.max(Math.ceil(hours), 1), 10);

            const dayCell = document.createElement('div');
            dayCell.className = `calendar-day heat-${heatLevel}`;
            
            let badge = hours > 0 ? `<div class="hours-badge">${hours}h</div>` : '';
            dayCell.innerHTML = `<div>${day}</div>${badge}`;
            grid.appendChild(dayCell);
        }
    }

    // --- Form Submission ---
    document.getElementById('hoursForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const date = document.getElementById('date').value;
        const hours = parseFloat(document.getElementById('hours').value);
        const note = document.getElementById('note').value.trim();
        const submitBtn = document.getElementById('submitBtn');
        const originalBtnText = submitBtn.textContent;

        if (!date || isNaN(hours)) {
            alert('Please enter a valid date and hours.');
            return;
        }

        triggerMoneyAnimation();

        // Save locally first
        entries[date] = { hours, note };
        saveLocalData();

        const loggedDate = parseDate(date);
        if (loggedDate.getMonth() === currentCalDate.getMonth() && loggedDate.getFullYear() === currentCalDate.getFullYear()) {
            renderCalendar();
        }

        // Sync to Google Sheets
        submitBtn.textContent = 'Saving to Cloud...';
        submitBtn.disabled = true;

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'save', date: date, hours: hours, note: note }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            
            if (data.status === 'success') {
                submitBtn.textContent = 'Saved to Cloud ✓';
                submitBtn.style.backgroundColor = 'var(--success)';
            }
        } catch (error) {
            console.error('Cloud sync error:', error);
            submitBtn.textContent = `Failed: ${error.message}`;
            submitBtn.style.backgroundColor = 'var(--danger)';
        } finally {
            setTimeout(() => {
                submitBtn.textContent = originalBtnText;
                submitBtn.style.backgroundColor = '';
                submitBtn.disabled = false;
                document.getElementById('hours').value = '';
                document.getElementById('note').value = '';
            }, 2000);
        }
    });

    // --- Delete Entry (Now Syncs to Google Sheets!) ---
    async function deleteEntry(date) {
        if (!confirm(`Delete entry for ${formatDateDisplay(date)}? This will also remove it from your Google Sheet.`)) {
            return;
        }

        // Delete locally first
        delete entries[date];
        saveLocalData();
        renderCalendar();

        // Sync delete to Google Sheets
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete', date: date }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            console.log('Delete synced to Google Sheets');
        } catch (error) {
            console.error('Delete sync error:', error);
            alert('Deleted locally, but failed to sync to Google Sheets. Try the "Force Re-Sync" button.');
        }
    }

    // --- Render History ---
    function render() {
        const historyContainer = document.getElementById('historyContainer');
        historyContainer.innerHTML = '';

        const dates = Object.keys(entries).sort().reverse();
        
        if (dates.length === 0) {
            historyContainer.innerHTML = '<div class="empty-state">No hours logged yet.</div>';
            document.getElementById('currentWeekTotal').textContent = '0';
            return;
        }

        const weeks = {};
        dates.forEach(date => {
            const monday = getMonday(date);
            if (!weeks[monday]) weeks[monday] = { days: {}, total: 0 };
            weeks[monday].days[date] = entries[date];
            weeks[monday].total += entries[date].hours;
        });

        const today = formatDateISO(new Date());
        const currentWeekMonday = getMonday(today);
        const currentWeekData = weeks[currentWeekMonday];
        document.getElementById('currentWeekTotal').textContent = currentWeekData ? currentWeekData.total : 0;

        Object.keys(weeks).sort().reverse().forEach(monday => {
            const weekData = weeks[monday];
            const weekStart = parseDate(monday);
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekEnd.getDate() + 6); // Sunday (7 days after Monday)
            const weekLabel = `${formatDateDisplay(monday)} - ${formatDateDisplay(formatDateISO(weekEnd))}`;

            const weekBlock = document.createElement('div');
            weekBlock.className = 'week-block';

            const header = document.createElement('div');
            header.className = 'week-header';
            header.innerHTML = `<span>Week of ${weekLabel}</span> <span>${weekData.total} hrs</span>`;
            weekBlock.appendChild(header);

            Object.keys(weekData.days).sort().reverse().forEach(date => {
                const entry = weekData.days[date];
                const dayEl = document.createElement('div');
                dayEl.className = 'day-entry';
                dayEl.innerHTML = `
                    <div class="day-info">
                        <div class="day-date">${formatDateDisplay(date)}</div>
                        ${entry.note ? `<div class="day-note">${entry.note}</div>` : ''}
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span class="day-hours">${entry.hours}h</span>
                        <button class="btn-danger" onclick="deleteEntry('${date}')">Delete</button>
                    </div>
                `;
                weekBlock.appendChild(dayEl);
            });

            historyContainer.appendChild(weekBlock);
        });
    }

    function clearLocalData() {
        if (confirm("Clear local browser cache? Your data is safe in Google Sheets.")) {
            localStorage.removeItem('workHoursTracker');
            location.reload();
        }
    }

    // --- Initialization ---
    async function init() {
        document.getElementById('date').valueAsDate = new Date();
        
        // Fetch data from Google Sheets on load
        const success = await fetchFromGoogleSheets();
        
        document.getElementById('loadingOverlay').style.display = 'none';
        
        if (!success) {
            document.getElementById('syncStatus').textContent = '⚠️ Using local cache (sync failed)';
            document.getElementById('syncStatus').style.backgroundColor = 'rgba(239, 68, 68, 0.3)';
        }
        
        renderCalendar();
        render();
    }

    init();
</script>

</body>
</html>
